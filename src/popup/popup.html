<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bookmarks</title>
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="bg-white text-slate-800 antialiased" style="margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;">

  <!-- ===== Header ===== -->
  <header class="flex items-center gap-3 px-5 py-0 bg-gradient-to-r from-indigo-600 to-violet-600 shadow-md flex-shrink-0" style="height:52px;">
    <!-- Logo -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <span class="text-xl leading-none select-none">🔖</span>
      <h1 class="text-white font-semibold text-base tracking-wide whitespace-nowrap">Smart Bookmarks</h1>
    </div>
    <!-- 搜索框 -->
    <div class="flex-1 max-w-2xl mx-4 relative">
      <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
        <svg class="w-4 h-4 text-white/60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input type="text" id="searchInput"
        class="w-full pl-9 pr-4 py-2 bg-white/15 border border-white/30 rounded-xl text-sm text-white placeholder:text-white/60 focus:outline-none focus:ring-2 focus:ring-white/40 focus:bg-white/20 transition-all duration-200"
        placeholder="搜索任意收藏内容，支持全文搜索"
        autocomplete="off" />
      <div id="searchSuggestions"
        class="search-suggestions absolute top-full left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-xl z-50 mt-1 overflow-hidden"
        style="display: none;"></div>
    </div>
    <!-- 右侧工具栏 -->
    <div class="flex items-center gap-1 flex-shrink-0">
      <button id="syncBtn" class="header-btn" title="同步浏览器收藏夹">🔄</button>
      <button id="importBtn" class="header-btn" title="从 JSON 文件导入收藏">📥</button>
      <button id="exportBtn" class="header-btn" title="导出收藏到 JSON 文件">📤</button>
      <button id="settingsBtn" class="header-btn" title="设置">⚙️</button>
    </div>
  </header>

  <!-- ===== 主体区域（左+右两列） ===== -->
  <div class="flex flex-1 min-h-0 overflow-hidden">

    <!-- ===== 左侧目录栏 ===== -->
    <aside id="sidebar" class="flex-shrink-0 flex flex-col bg-slate-50 border-r border-slate-200 overflow-hidden select-none" style="width:260px;">
      <!-- 固定入口 -->
      <div class="flex-shrink-0 pt-2 pb-1 px-2">
        <button class="sidebar-nav-item active" id="navAll" data-nav="all">
          <span class="sidebar-nav-icon">📚</span>
          <span class="sidebar-nav-label">全部收藏</span>
          <span class="sidebar-nav-count" id="navAllCount"></span>
        </button>
        <button class="sidebar-nav-item" id="navRecent" data-nav="recent">
          <span class="sidebar-nav-icon">🕐</span>
          <span class="sidebar-nav-label">最近添加</span>
        </button>
        <button class="sidebar-nav-item" id="navBroken" data-nav="broken">
          <span class="sidebar-nav-icon">⚠️</span>
          <span class="sidebar-nav-label">失效链接</span>
          <span class="sidebar-nav-count broken" id="navBrokenCount" style="display:none;"></span>
        </button>
        <button class="sidebar-nav-item" id="navTags" data-nav="tags">
          <span class="sidebar-nav-icon">🏷️</span>
          <span class="sidebar-nav-label">标签视图</span>
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <!-- 文件夹树（可滚动） -->
      <div class="flex-1 overflow-y-auto py-1 px-2" id="sidebarTree">
        <div class="flex items-center gap-1 px-2 py-1 mb-1">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">收藏夹</span>
        </div>
        <div id="sidebarTreeContent" class="text-sm"></div>
      </div>
      <!-- 底部状态栏 -->
      <div class="flex-shrink-0 px-3 py-2 border-t border-slate-200 bg-slate-100/50">
        <div id="sidebarStats" class="text-xs text-slate-400 text-center"></div>
      </div>
    </aside>

    <!-- ===== 可拖拽分割线 ===== -->
    <div id="sidebarResizer" class="sidebar-resizer flex-shrink-0"></div>

    <!-- ===== 右侧主区域 ===== -->
    <main class="flex-1 flex flex-col min-h-0 overflow-hidden bg-white">
      <!-- 面包屑导航 -->
      <div class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 border-b border-slate-100 bg-white" style="min-height:42px;">
        <div id="breadcrumb" class="flex items-center gap-1 text-sm text-slate-500 flex-1 min-w-0 overflow-hidden"></div>
        <div id="searchStats" class="text-xs text-slate-400 flex-shrink-0" style="display: none;"></div>
        <div id="folderStats" class="text-xs text-slate-400 flex-shrink-0"></div>
      </div>
      <!-- 内容列表 -->
      <div class="flex-1 min-h-0 overflow-y-auto" id="bookmarkList">
        <div class="flex flex-col items-center justify-center h-full gap-3 text-slate-400 py-16">
          <svg class="w-7 h-7 animate-spin text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-sm">正在加载收藏...</span>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== 右下角任务面板（固定浮动） ===== -->
  <div id="taskPanel" class="task-panel collapsed">
    <div class="task-panel-header" id="taskPanelHeader">
      <span class="task-panel-title">⚡ 任务</span>
      <button id="taskPanelToggle" class="task-panel-btn" title="折叠/展开">
        <svg id="taskPanelChevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <!-- 快捷操作行（始终可见） -->
    <div class="task-panel-quick">
      <button id="analyzeBtn" class="task-quick-btn indigo" title="AI 智能分析并分类收藏">🤖 <span>分析</span></button>
      <button id="debugAnalyzeBtn" class="task-quick-btn emerald" title="调试分析">🔬 <span>调试</span></button>
      <button id="checkBrokenBtn" class="task-quick-btn amber" title="检测失效链接">⚠️ <span>检测</span></button>
    </div>
    <!-- 展开时的详细进度 -->
    <div class="task-panel-body" id="taskPanelBody">
      <div id="analyzeProgressSection" class="task-progress-section" style="display:none;">
        <div class="task-progress-header">
          <span class="task-progress-label">🤖 AI 分析</span>
          <div class="flex items-center gap-2">
            <span id="analyzeProgressCount" class="task-count-badge">0/0</span>
            <button id="cancelAnalyzeBtn" class="task-cancel-btn" style="display:none;">✕ 取消</button>
          </div>
        </div>
        <div class="task-progress-bar-wrap">
          <div id="analyzeProgressFill" class="task-progress-fill indigo" style="width:0%"></div>
        </div>
        <div id="analyzeProgressSub" class="task-progress-sub"></div>
      </div>
      <div id="checkProgressSection" class="task-progress-section" style="display:none;">
        <div class="task-progress-header">
          <span class="task-progress-label">⚠️ 链接检测</span>
          <div class="flex items-center gap-2">
            <span id="checkProgressEta" class="text-xs text-slate-400"></span>
            <span id="checkProgressCount" class="task-count-badge">0/0</span>
            <button id="cancelCheckBtn" class="task-cancel-btn" style="display:none;">✕ 取消</button>
          </div>
        </div>
        <div class="task-progress-bar-wrap">
          <div id="checkProgressFill" class="task-progress-fill amber" style="width:0%"></div>
        </div>
        <div id="checkProgressSub" class="task-progress-sub"></div>
      </div>
    </div>
  </div>

  <!-- ===== 右键上下文菜单 ===== -->
  <div id="contextMenuEl" class="ctx-menu" style="display:none;">
    <button class="ctx-item" data-action="open">在新标签页中打开</button>
    <button class="ctx-item" data-action="openIncognito">在无痕窗口中打开</button>
    <button class="ctx-item" data-action="openGroup">在新标签页分组打开</button>
    <button class="ctx-item" data-action="openWindow">在新窗口中打开</button>
    <div class="ctx-separator"></div>
    <button class="ctx-item" data-action="edit">修改</button>
    <button class="ctx-item" data-action="cut">剪切</button>
    <button class="ctx-item" data-action="copy">复制链接</button>
    <button class="ctx-item" data-action="paste">粘贴</button>
    <div class="ctx-separator"></div>
    <button class="ctx-item" data-action="regenerateSummary">重新生成概述</button>
    <div class="ctx-separator"></div>
    <button class="ctx-item danger" data-action="delete">删除</button>
  </div>

  <!-- ===== 编辑收藏对话框 ===== -->
  <div id="editDialog" class="edit-dialog-overlay" style="display:none;">
    <div class="edit-dialog">
      <div class="edit-dialog-header">
        <h2 id="editDialogTitle">编辑收藏</h2>
        <button id="editDialogClose" class="edit-dialog-close">&times;</button>
      </div>
      <div class="edit-dialog-body">
        <div class="edit-field">
          <label class="edit-label">名称</label>
          <input type="text" id="editTitle" class="edit-input" placeholder="收藏标题" />
        </div>
        <div class="edit-field" id="editUrlField">
          <label class="edit-label">网址</label>
          <input type="url" id="editUrl" class="edit-input" placeholder="https://..." />
        </div>
        <div class="edit-field">
          <label class="edit-label" style="display:flex;align-items:center;justify-content:space-between;">
            <span>概述</span>
            <button id="editRegenerateBtn" class="edit-regen-btn">🔄 重新生成</button>
          </label>
          <textarea id="editSummary" class="edit-textarea" rows="3" placeholder="对该收藏的简短描述..."></textarea>
        </div>
        <div class="edit-field" id="editTagsField">
          <label class="edit-label">标签</label>
          <input type="text" id="editTags" class="edit-input" placeholder="用逗号分隔多个标签" />
        </div>
      </div>
      <div class="edit-dialog-footer">
        <button id="editDialogCancel" class="btn btn-cancel">取消</button>
        <button id="editDialogSave" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 隐藏的旧进度兼容层 ===== -->
  <div id="progressSection" style="display:none;">
    <span id="progressMessage"></span>
    <span id="progressCount"></span>
    <div id="progressFill"></div>
    <span id="progressEta"></span>
    <div id="progressSub"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
