<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bookmarks</title>
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="antialiased" style="margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;background:var(--c-bg);color:var(--c-text);">

  <!-- ===== Header ===== -->
  <header class="flex items-center gap-3 px-5 py-0 flex-shrink-0" style="height:52px;background:#1a1a6e;box-shadow:0 1px 0 rgba(255,255,255,.06),0 2px 16px rgba(13,17,23,.22);" role="banner">
    <!-- Logo -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <span class="text-xl leading-none select-none" aria-hidden="true">🔖</span>
      <h1 class="text-white font-semibold text-base tracking-wide whitespace-nowrap">Smart Bookmarks</h1>
    </div>
    <!-- 搜索框 -->
    <div class="flex-1 max-w-2xl mx-4 relative">
      <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none" aria-hidden="true">
        <svg class="w-4 h-4 text-white/60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <label for="searchInput" class="sr-only">搜索收藏</label>
      <input type="text" id="searchInput"
        class="w-full pl-9 pr-4 py-2 bg-white/15 border border-white/30 rounded-xl text-sm text-white placeholder:text-white/60 focus:outline-none focus:ring-2 focus:ring-white/40 focus:bg-white/20 transition-all duration-200"
        placeholder="搜索任意收藏内容，支持全文搜索"
        autocomplete="off"
        aria-label="搜索收藏"
        aria-describedby="search-hint" />
      <span id="search-hint" class="sr-only">输入关键词搜索书签、标签和描述</span>
      <div id="searchSuggestions"
        class="search-suggestions absolute top-full left-0 right-0 rounded-xl shadow-xl z-50 mt-1 overflow-hidden"
        style="display: none;"
        role="listbox"
        aria-label="搜索建议"></div>
    </div>
    <!-- 右侧工具栏 -->
    <div class="flex items-center gap-1 flex-shrink-0" role="toolbar" aria-label="工具栏">
      <button id="importBtn" class="header-btn" title="从 JSON 文件导入收藏" aria-label="从 JSON 文件导入收藏">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button id="exportBtn" class="header-btn" title="导出收藏（支持多种格式）" aria-label="导出收藏">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <button id="settingsBtn" class="header-btn" title="设置" aria-label="打开设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== 主体区域（左+右两列） ===== -->
  <div class="flex flex-1 min-h-0 overflow-hidden">

    <!-- ===== 左侧目录栏 ===== -->
    <aside id="sidebar" class="flex-shrink-0 flex flex-col overflow-hidden select-none" style="width:260px;background:var(--c-surface-low);border-right:1px solid var(--c-border);" role="navigation" aria-label="侧边栏导航">
      <!-- 固定入口 -->
      <div class="flex-shrink-0 pt-2 pb-1 px-2" role="list">
        <button class="sidebar-nav-item active" id="navAll" data-nav="all" role="listitem" tabindex="0">
          <span class="sidebar-nav-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="sidebar-nav-label">全部收藏</span>
          <span class="sidebar-nav-count" id="navAllCount" aria-label="收藏数量"></span>
        </button>
        <button class="sidebar-nav-item" id="navRecent" data-nav="recent" role="listitem" tabindex="0">
          <span class="sidebar-nav-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <span class="sidebar-nav-label">最近添加</span>
        </button>
        <button class="sidebar-nav-item" id="navBroken" data-nav="broken" role="listitem" tabindex="0">
          <span class="sidebar-nav-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </span>
          <span class="sidebar-nav-label">失效链接</span>
          <span class="sidebar-nav-count broken" id="navBrokenCount" style="display:none;" aria-label="失效链接数量"></span>
        </button>
        <button class="sidebar-nav-item" id="navTags" data-nav="tags" role="listitem" tabindex="0">
          <span class="sidebar-nav-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </span>
          <span class="sidebar-nav-label">标签视图</span>
        </button>
      </div>
      <div class="sidebar-divider" role="separator" aria-hidden="true"></div>
      <!-- 文件夹树（可滚动） -->
      <div class="flex-1 overflow-y-auto py-1 px-2" id="sidebarTree" role="tree" aria-label="文件夹树">
        <div class="flex items-center gap-1 px-2 py-1 mb-1">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">收藏夹</span>
        </div>
        <div id="sidebarTreeContent" class="text-sm" role="group" aria-label="收藏夹列表"></div>
      </div>
      <!-- 任务面板（内嵌左下角） -->
      <div id="taskPanel" class="task-panel collapsed" role="complementary" aria-label="任务面板">
        <div class="task-panel-header" id="taskPanelHeader">
          <span class="task-panel-title">⚡ 任务</span>
          <button id="taskPanelToggle" class="task-panel-btn" title="折叠/展开" aria-expanded="false" aria-controls="taskPanelBody">
            <svg id="taskPanelChevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
        </div>
        <div class="task-panel-quick">
          <button id="analyzeBtn" class="task-quick-btn indigo" title="AI 智能分析并分类收藏" aria-label="AI 智能分析并分类收藏">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/><path d="M19 3v4"/><path d="M21 5h-4"/></svg>
            <span>分析</span>
          </button>
          <button id="mergeSuggestBtn" class="task-quick-btn purple" title="合并建议 - 检测重复分类" aria-label="合并建议">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h10"/><path d="M6 12h9"/><path d="M11 18h7"/><path d="M3 6l3 3-3 3"/></svg>
            <span>合并</span>
          </button>
          <button id="deduplicateBtn" class="task-quick-btn rose" title="去重 - 检测重复的书签和目录" aria-label="去重">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>去重</span>
          </button>
          <button id="debugAnalyzeBtn" class="task-quick-btn emerald" title="调试分析" aria-label="调试分析">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            <span>调试</span>
          </button>
          <button id="checkBrokenBtn" class="task-quick-btn amber" title="检测失效链接" aria-label="检测失效链接">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9c1.51 0 2.93.37 4.18 1.03"/><path d="M16 5l3-3 3 3"/><path d="M19 2v8"/></svg>
            <span>检测</span>
          </button>
        </div>
        <div class="task-panel-body" id="taskPanelBody">
          <div id="analyzeProgressSection" class="task-progress-section" style="display:none;" role="status" aria-live="polite">
            <div class="task-progress-header">
              <span class="task-progress-label">🤖 AI 分析</span>
              <div class="flex items-center gap-2">
                <span id="analyzeProgressCount" class="task-count-badge" aria-label="分析进度">0/0</span>
                <button id="cancelAnalyzeBtn" class="task-cancel-btn" style="display:none;" aria-label="取消分析">✕ 取消</button>
              </div>
            </div>
            <div class="task-progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="AI 分析进度">
              <div id="analyzeProgressFill" class="task-progress-fill indigo" style="width:0%"></div>
            </div>
            <div id="analyzeProgressSub" class="task-progress-sub" aria-live="polite"></div>
          </div>
          <div id="checkProgressSection" class="task-progress-section" style="display:none;" role="status" aria-live="polite">
            <div class="task-progress-header">
              <span class="task-progress-label">⚠️ 链接检测</span>
              <div class="flex items-center gap-2">
                <span id="checkProgressEta" class="text-xs text-slate-400" aria-label="预计剩余时间"></span>
                <span id="checkProgressCount" class="task-count-badge" aria-label="检测进度">0/0</span>
                <button id="cancelCheckBtn" class="task-cancel-btn" style="display:none;" aria-label="取消检测">✕ 取消</button>
              </div>
            </div>
            <div class="task-progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="链接检测进度">
              <div id="checkProgressFill" class="task-progress-fill amber" style="width:0%"></div>
            </div>
            <div id="checkProgressSub" class="task-progress-sub" aria-live="polite"></div>
          </div>
        </div>
      </div>
      <!-- 底部状态栏 -->
      <div class="flex-shrink-0 px-3 py-1.5" style="border-top:1px solid var(--c-border);background:rgba(242,244,246,.6);">
        <div id="sidebarStats" class="text-xs text-slate-400 text-center" role="status" aria-live="polite"></div>
      </div>
    </aside>

    <!-- ===== 可拖拽分割线 ===== -->
    <div id="sidebarResizer" class="sidebar-resizer flex-shrink-0" role="separator" aria-orientation="vertical" aria-label="调整侧边栏宽度"></div>

    <!-- ===== 右侧主区域 ===== -->
    <main class="flex-1 flex flex-col min-h-0 overflow-hidden bg-white" role="main" aria-label="书签列表">
      <!-- 面包屑导航 -->
      <div class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5" style="min-height:42px;border-bottom:1px solid var(--c-border);background:var(--c-surface);" role="navigation" aria-label="面包屑导航">
        <nav id="breadcrumb" class="flex items-center gap-1 text-sm text-slate-500 flex-1 min-w-0 overflow-hidden" aria-label="当前位置"></nav>
        <div id="searchStats" class="text-xs text-slate-400 flex-shrink-0" style="display: none;" role="status" aria-live="polite"></div>
        <div id="folderStats" class="text-xs text-slate-400 flex-shrink-0" aria-live="polite"></div>
      </div>
      <!-- 内容列表 -->
      <div class="flex-1 min-h-0 overflow-y-auto" id="bookmarkList" role="region" aria-label="书签内容" aria-live="polite">
        <div class="flex flex-col items-center justify-center h-full gap-3 text-slate-400 py-16">
          <svg class="w-7 h-7 animate-spin text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-sm">正在加载收藏...</span>
        </div>
      </div>
    </main>
  </div>

  <!-- 任务面板已移至左侧 sidebar 底部 -->

  <!-- ===== 右键上下文菜单 ===== -->
  <div id="contextMenuEl" class="ctx-menu" style="display:none;" role="menu" aria-label="操作菜单">
    <!-- 左侧边栏专用菜单项 -->
    <button class="ctx-item" data-action="addSubFolder" data-for-sidebar-only style="display:none;" role="menuitem" tabindex="-1">➕ 新建子文件夹</button>
    <button class="ctx-item" data-action="renameFolder" data-for-sidebar-only data-for-folder style="display:none;" role="menuitem" tabindex="-1">✏️ 重命名</button>
    <div class="ctx-separator" data-for-sidebar-only style="display:none;" role="separator"></div>

    <!-- 右侧区域专用菜单项 -->
    <button class="ctx-item" data-action="open" data-for-content-only style="display:none;" role="menuitem" tabindex="-1">在新标签页中打开</button>
    <button class="ctx-item" data-action="openIncognito" data-for-content-only style="display:none;" role="menuitem" tabindex="-1">在无痕窗口中打开</button>
    <div class="ctx-separator" data-for-content-only style="display:none;" role="separator"></div>

    <!-- 通用菜单项 -->
    <button class="ctx-item" data-action="edit" role="menuitem" tabindex="-1">修改</button>
    <button class="ctx-item" data-action="cut" role="menuitem" tabindex="-1">剪切</button>
    <button class="ctx-item" data-action="copy" role="menuitem" tabindex="-1">复制链接</button>
    <button class="ctx-item" data-action="paste" role="menuitem" tabindex="-1" aria-disabled="true">粘贴</button>
    <div class="ctx-separator" role="separator"></div>

    <!-- 右侧区域书签专用 -->
    <button class="ctx-item" data-action="regenerateSummary" data-for-content-only data-for-bookmark style="display:none;" role="menuitem" tabindex="-1">重新生成概述</button>

    <!-- 文件夹专用菜单项（两侧通用） -->
    <button class="ctx-item" data-action="openFolder" data-for-folder style="display:none;" role="menuitem" tabindex="-1">打开文件夹</button>
    <button class="ctx-item" data-action="mergeFolder" data-for-folder style="display:none;" role="menuitem" tabindex="-1">合并到...</button>
    <div class="ctx-separator" data-for-folder style="display:none;" role="separator"></div>
    <button class="ctx-item danger" data-action="delete" role="menuitem" tabindex="-1">删除</button>
  </div>

  <!-- ===== 编辑收藏对话框 ===== -->
  <div id="editDialog" class="edit-dialog-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="editDialogTitle">
    <div class="edit-dialog">
      <div class="edit-dialog-header">
        <h2 id="editDialogTitle">编辑收藏</h2>
        <button id="editDialogClose" class="edit-dialog-close" aria-label="关闭对话框">&times;</button>
      </div>
      <div class="edit-dialog-body">
        <div class="edit-field">
          <label class="edit-label" for="editTitle">名称</label>
          <input type="text" id="editTitle" class="edit-input" placeholder="收藏标题" aria-required="true" required />
        </div>
        <div class="edit-field" id="editUrlField">
          <label class="edit-label" for="editUrl">网址</label>
          <input type="url" id="editUrl" class="edit-input" placeholder="https://..." aria-required="true" required />
        </div>
        <div class="edit-field">
          <label class="edit-label" for="editSummary" style="display:flex;align-items:center;justify-content:space-between;">
            <span>概述</span>
            <button id="editRegenerateBtn" class="edit-regen-btn" aria-label="重新生成概述">🔄 重新生成</button>
          </label>
          <textarea id="editSummary" class="edit-textarea" rows="3" placeholder="对该收藏的简短描述..." aria-describedby="summary-hint"></textarea>
          <span id="summary-hint" class="sr-only">输入书签的简短描述</span>
        </div>
        <div class="edit-field" id="editTagsField">
          <label class="edit-label" for="editTags">标签</label>
          <input type="text" id="editTags" class="edit-input" placeholder="用逗号分隔多个标签" aria-describedby="tags-hint" />
          <span id="tags-hint" class="sr-only">用逗号分隔多个标签，例如：技术, 前端, JavaScript</span>
        </div>
      </div>
      <div class="edit-dialog-footer">
        <button id="editDialogCancel" class="btn btn-cancel">取消</button>
        <button id="editDialogSave" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 隐藏的旧进度兼容层 ===== -->
  <div id="progressSection" style="display:none;">
    <span id="progressMessage"></span>
    <span id="progressCount"></span>
    <div id="progressFill"></div>
    <span id="progressEta"></span>
    <div id="progressSub"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
