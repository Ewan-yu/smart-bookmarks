<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bookmarks - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px;margin-right:8px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置</h1>
    </header>

    <main class="main">
      <section class="section">
        <h2>AI 配置</h2>
        <p class="section-desc">
          配置 OpenAI 兼容的 API 来启用智能分类和语义搜索功能。
        </p>

        <form id="aiConfigForm" class="form">
          <div class="form-group">
            <label for="apiUrl">API 地址</label>
            <input
              type="url"
              id="apiUrl"
              placeholder="https://api.openai.com/v1"
              required
            />
            <small>支持 OpenAI 兼容的 API 地址</small>
          </div>

          <div class="form-group">
            <label for="apiKey">API 密钥</label>
            <input
              type="password"
              id="apiKey"
              placeholder="sk-..."
              required
            />
            <small>密钥仅存储在本地，不会上传到其他服务器</small>
          </div>

          <div class="form-group">
            <label for="model">模型名称</label>
            <input
              type="text"
              id="model"
              placeholder="gpt-3.5-turbo"
              value="gpt-3.5-turbo"
              required
            />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存配置</button>
            <button type="button" id="testBtn" class="btn btn-secondary">测试连接</button>
          </div>
        </form>
      </section>

      <section class="section">
        <h2>数据管理</h2>
        <p class="section-desc">管理收藏夹数据</p>

        <div class="data-actions">
          <button id="importBookmarks" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>从浏览器导入
          </button>
          <button id="exportBookmarks" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>导出为 JSON
          </button>
          <button id="clearData" class="btn btn-danger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:5px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>清空所有数据
          </button>
        </div>
      </section>

      <section class="section">
        <h2>关于</h2>
        <div class="about">
          <p><strong>Smart Bookmarks</strong> v1.0.0</p>
          <p>智能收藏夹管理插件</p>
          <p style="margin-top: 12px;">
            <a href="#" id="githubLink">GitHub</a> |
            <a href="#" id="docsLink">文档</a>
          </p>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
